<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataCenter - Control de Acceso</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f0f23;
        color: white;
        min-height: 100vh;
      }
      input, select, textarea, button { font-family: inherit; }
      input:focus, select:focus, textarea:focus { outline: 2px solid #e94560; outline-offset: -1px; }
      table th, table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #333; }
      table th { background: #16213e; color: #e94560; font-weight: 600; font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; }
      table tr:hover { background: #16213e55; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
